name: Build NetHunter Kernel (Full Power)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev libncurses-dev gcc-aarch64-linux-gnu

      - name: Download and Setup
        run: |
          git clone --depth=1 https://android.googlesource.com/kernel/common -b android12-5.10 kernel-source
          cd kernel-source
          
          # Adding WiFi Drivers & Monitor Mode Support
          echo "CONFIG_WLAN=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_ATH9K_HTC=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_CFG80211=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_MAC80211=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_CFG80211_WEXT=y" >> arch/arm64/configs/gki_defconfig
          
          # Add KernelSU
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      - name: Build Kernel
        run: |
          cd kernel-source
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          # Using KCFLAGS to ignore warnings that stop the build
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-Wno-error" -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Kernel-Final
          path: kernel-source/arch/arm64/boot/Image
